name: Build Application

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
        type: string
      build_type:
        description: 'Type of build to perform'
        required: false
        default: 'standard'
        type: choice
        options:
          - compile-only
          - standard
          - workflow-import
          - both

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}
        
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Compile only (check for compilation errors)
      if: ${{ inputs.build_type == 'compile-only' }}
      run: ./gradlew compileJava --continue

    - name: Run tests
      if: ${{ inputs.build_type != 'compile-only' }}
      run: ./gradlew test

    - name: Build standard JAR
      if: ${{ inputs.build_type == 'standard' || inputs.build_type == 'both' }}
      run: ./gradlew bootJar
      
    - name: Build workflow import JAR
      if: ${{ inputs.build_type == 'workflow-import' || inputs.build_type == 'both' }}
      run: ./gradlew bootJarWorkflowImport
      
    - name: Upload standard build artifacts
      if: ${{ inputs.build_type == 'standard' || inputs.build_type == 'both' }}
      uses: actions/upload-artifact@v4
      with:
        name: standard-jar-${{ inputs.branch }}
        path: build/libs/*-SNAPSHOT.jar
        retention-days: 30
        
    - name: Upload workflow import build artifacts
      if: ${{ inputs.build_type == 'workflow-import' || inputs.build_type == 'both' }}
      uses: actions/upload-artifact@v4
      with:
        name: workflow-import-jar-${{ inputs.branch }}
        path: build/libs/*-workflow-import.jar
        retention-days: 30
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ inputs.branch }}
        path: build/test-results/test/
        retention-days: 7
        
    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports-${{ inputs.branch }}
        path: build/reports/tests/test/
        retention-days: 7

  summary:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
    - name: Build Summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch:** ${{ inputs.branch }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Type:** ${{ inputs.build_type }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Status:** ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Workflow Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
